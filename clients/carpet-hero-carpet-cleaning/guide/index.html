<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Guide - Carpet Hero Carpet Cleaning | AEOthis</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/images/favicon-aeothis.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../css/style.css?v=20260311b">
  <style>
    .guide-hero { padding: 100px 0 40px; text-align: center; }
    .guide-hero__logo { max-width: 160px; margin: 0 auto 24px; }
    .guide-hero__title { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
    .guide-hero__sub { font-size: 1.1rem; color: var(--text-light, #94a3b8); max-width: 480px; margin: 0 auto; line-height: 1.7; }
    .guide-progress { max-width: 680px; margin: 0 auto 48px; padding: 0 24px; }
    .guide-progress__bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
    .guide-progress__fill { height: 100%; background: linear-gradient(90deg, var(--accent, #cb6ce6), var(--cta, #7ed7ed)); border-radius: 3px; transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); width: 0%; }
    .guide-progress__label { font-size: 0.85rem; color: var(--text-muted, rgba(255,255,255,0.45)); text-align: right; }
    .guide-task { background: rgba(255,255,255,0.03); border: 1px solid var(--border, rgba(255,255,255,0.1)); border-radius: 20px; padding: 0; margin-bottom: 32px; max-width: 720px; margin-left: auto; margin-right: auto; overflow: hidden; transition: border-color 0.3s; }
    .guide-task.is-complete { border-color: var(--success, #10b981); }
    .guide-task__header { padding: 32px 36px 0; display: flex; align-items: flex-start; gap: 16px; }
    .guide-task__icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; background: rgba(126,215,237,0.15); color: var(--cta, #7ed7ed); }
    .guide-task__info { flex: 1; }
    .guide-task__title { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .guide-task__desc { font-size: 0.95rem; color: var(--text-light, #94a3b8); line-height: 1.6; }
    .guide-task__time { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }
    .guide-task__badge { display: none; background: var(--success); color: #fff; font-size: 0.78rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; margin-top: 4px; }
    .guide-task.is-complete .guide-task__badge { display: inline-flex; }
    .guide-steps { padding: 28px 36px 36px; }
    .guide-step { margin-bottom: 28px; }
    .guide-step:last-child { margin-bottom: 0; }
    .guide-step__check { display: flex; align-items: flex-start; gap: 12px; cursor: pointer; -webkit-user-select: none; user-select: none; }
    .guide-step__checkbox { width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.2); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; background: transparent; }
    .guide-step__checkbox.is-checked { background: var(--success, #10b981); border-color: var(--success, #10b981); }
    .guide-step__checkbox.is-checked::after { content: '\2713'; color: #fff; font-size: 13px; font-weight: 700; }
    .guide-step__label { font-size: 1rem; font-weight: 600; line-height: 1.5; }
    .guide-step__label.is-done { text-decoration: line-through; opacity: 0.5; }
    .guide-step__details { margin-top: 14px; margin-left: 34px; }
    .guide-step__note { font-size: 0.9rem; color: var(--text-light); line-height: 1.6; margin-bottom: 14px; }
    .guide-step__note a { color: var(--cta, #7ed7ed); text-decoration: underline; text-underline-offset: 2px; }
    .copy-field { display: flex; align-items: stretch; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
    .copy-field__label { padding: 10px 14px; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; background: rgba(255,255,255,0.04); border-right: 1px solid rgba(255,255,255,0.06); min-width: 110px; display: flex; align-items: center; white-space: nowrap; }
    .copy-field__value { flex: 1; padding: 10px 14px; font-size: 0.95rem; color: #fff; font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; word-break: break-all; display: flex; align-items: center; line-height: 1.4; }
    .copy-field__btn { padding: 10px 16px; background: rgba(203,108,230,0.12); border: none; color: var(--accent, #cb6ce6); cursor: pointer; font-size: 0.85rem; font-weight: 600; font-family: inherit; transition: all 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap; border-left: 1px solid rgba(255,255,255,0.06); }
    .copy-field__btn:hover { background: rgba(203,108,230,0.22); }
    .copy-field__btn.is-copied { background: rgba(16,185,129,0.15); color: var(--success, #10b981); }
    .copy-block { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
    .copy-block__header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .copy-block__label { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .copy-block__btn { background: rgba(203,108,230,0.12); border: none; color: var(--accent); cursor: pointer; font-size: 0.82rem; font-weight: 600; font-family: inherit; padding: 6px 14px; border-radius: 6px; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .copy-block__btn:hover { background: rgba(203,108,230,0.22); }
    .copy-block__btn.is-copied { background: rgba(16,185,129,0.15); color: var(--success); }
    .copy-block__text { padding: 14px; font-size: 0.92rem; color: var(--text-light); line-height: 1.7; }
    .copy-block__chars { font-size: 0.78rem; color: var(--text-muted); }
    .guide-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }
    .guide-tip { background: rgba(126,215,237,0.08); border: 1px solid rgba(126,215,237,0.15); border-radius: 10px; padding: 14px 18px; font-size: 0.9rem; color: var(--text-light); line-height: 1.6; margin-bottom: 14px; }
    .guide-tip strong { color: var(--cta, #7ed7ed); font-weight: 600; }
    .guide-footer { text-align: center; padding: 48px 0; font-size: 0.85rem; color: var(--text-muted); }
    .guide-footer a { color: var(--accent); }
    @media (max-width: 640px) {
      .guide-hero { padding: 80px 0 32px; }
      .guide-hero__title { font-size: 1.7rem; }
      .guide-task__header { padding: 24px 20px 0; flex-direction: column; }
      .guide-steps { padding: 20px 20px 24px; }
      .copy-field { flex-direction: column; }
      .copy-field__label { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); min-width: auto; padding: 8px 14px; }
      .copy-field__btn { border-left: none; border-top: 1px solid rgba(255,255,255,0.06); justify-content: center; padding: 12px; }
    }
  </style>
